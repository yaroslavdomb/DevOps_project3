apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: backend
spec:
  replicas: 5
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: nexus-pull-secret
      containers:
        - name: backend
          image: nexus.local/be-img:22
          imagePullPolicy: Always
          env:
            - name: DOTENV_PROCESS_ENV
              value: "true"
          ports:
            - containerPort: 3000
          envFrom:
          - secretRef:
              name: back-env-secret
          - configMapRef:
              name: backend-configmap