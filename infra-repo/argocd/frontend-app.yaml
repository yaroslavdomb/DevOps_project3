apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: frontend-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/yaroslavdomb/DevOps_project3
    targetRevision: main
    path: infra-repo/kubernetes
    directory:
      recurse: true
      include: '**/front-*.yaml'

  destination:
    server: https://kubernetes.default.svc
    namespace: frontend

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false