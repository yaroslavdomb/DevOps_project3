<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Hotels</title>
        <link rel="stylesheet" href="../CSS/reservation.css" />
    </head>
    <body>
        <header>some small menu</header>

        <main>
            <h1 class="txt-center">Check your reservations</h1>
                <form>
                    <fieldset>
                        <legend>Search by ... </legend>
                        <div>
                            <label for="guest-name">Name:</label>
                            <input
                                type="text"
                                id="guest-name"
                                placeholder="input your full name"
                                pattern="[\p{L}\s]+"
                                aria-describedby="name-hint"
                            />
                            <span id="name-hint" style="display: none">Only letters and space allowed</span>
                        </div>
                        <span>
                            OR
                        </span>
                        <div>
                            <label for="guest-email">Email:</label>
                            <input type="email" id="guest-email" aria-describedby="email-hint" />
                        </div>
                        <div>
                            <button type="submit" onClick="">Search</button>
                        </div>
                    </fieldset>
                </form>

                <div>
                    <div hidden>
                        <h3>
                            Active:
                        </h3>
                    </div>
                    <div hidden>
                        <h3>
                            Completed:
                        </h3>
                    </div>
                </div>
            </div>
        </main>

        <footer class="txt-center">Footer textual links</footer>
    </body>
</html>
